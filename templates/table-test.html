<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Table Report</title>
  <style>
    @page {
      size: A4;
      margin: 2cm;
    }

    body {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 12px;
      color: #222;
      background: #fff;
    }

    h1 {
      font-size: 20px;
      font-weight: normal;
      margin-bottom: 16px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    thead tr {
      background-color: #2c3e50;
      color: #fff;
    }

    thead th {
      padding: 8px 10px;
      text-align: left;
      font-weight: bold;
    }

    tbody tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    tbody tr:nth-child(odd) {
      background-color: #ffffff;
    }

    tbody td {
      padding: 7px 10px;
      border-bottom: 1px solid #ddd;
    }

    .header {
      margin-bottom: 16px;
    }

    .logo {
      height: 48px;
      width: auto;
    }

    .footer {
      margin-top: 24px;
      font-size: 10px;
      color: #888;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="logo.png" alt="Logo" class="logo" />
  </div>

  <h1>Sample Table Report</h1>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Node</th>
        <th>Data Center</th>
        <th>Status</th>
        <th>CPU Usage</th>
        <th>Disk Usage</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>1</td><td>node-01</td><td>dc1</td><td>Up</td><td>34%</td><td>52%</td></tr>
      <tr><td>2</td><td>node-02</td><td>dc1</td><td>Up</td><td>41%</td><td>60%</td></tr>
      <tr><td>3</td><td>node-03</td><td>dc2</td><td>Up</td><td>28%</td><td>45%</td></tr>
      <tr><td>4</td><td>node-04</td><td>dc2</td><td>Down</td><td>0%</td><td>45%</td></tr>
      <tr><td>5</td><td>node-05</td><td>dc3</td><td>Up</td><td>55%</td><td>71%</td></tr>
      <tr><td>6</td><td>node-06</td><td>dc3</td><td>Up</td><td>62%</td><td>68%</td></tr>
    </tbody>
  </table>

  <div class="footer">Generated by reporting-v2</div>
</body>
</html>
